    <!-- 2. Assignment Operators (Store Values) -->
    <!-- Assignment operators are used to assign values to variables. -->


    <!-- 
| `=`      | Assign            | `x = 5`  | 
| `+=`     | Add & assign      | `x += 2` |
| `-=`     | Subtract & assign | `x -= 2` |
| `*=`     | Multiply & assign | `x *= 2` |
| `/=`     | Divide & assign   | `x /= 2` | -->

    <!-- 3. Comparison Operators (Check / Compare)
Answer is true or false. -->
    <!-- 
| `==`     | Equal (value only)   | `5 == "5"` → true   |
| `===`    | Equal (value + type) | `5 === "5"` → false |
| `!=`     | Not equal            | `5 != 3`            |
| `!==`    |  strict Not equal (type)     | `5 !== "5"`         |
| `>`      | Greater than         | `10 > 5`            |
| `<`      | Less than            | `5 < 10`            |
| `>=`     | Greater or equal     | `5 >= 5`            |
| `<=`     | Less or equal        | `5 <= 10`           | -->
