    <!-- 15. Execution Flow Documentation -->
    <!-- Ans : The script executes in a predictable order following JavaScript’s single-threaded execution model.
    Synchronous code runs first from top to bottom during the initial parse phase.
    Event listeners and asynchronous callbacks (such as timers or network responses) are registered during this phase
    but executed later via the event loop.
    Deferred or dynamically imported modules execute after the DOM is ready, preventing render blocking.
    This ensures that critical UI rendering occurs before non-essential logic, improving perceived performance and
    responsiveness. -->
